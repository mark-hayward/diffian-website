AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Diffian website — GitHub Actions OIDC provider + deploy role.
  The S3 bucket (diffian, eu-west-2) and CloudFront distribution (EF9LHCH0Z4JI4)
  already exist; this stack only manages IAM so deployments never use long-lived keys.

Resources:

  # ---------- GitHub Actions OIDC provider ----------
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  # ---------- IAM role assumed by GitHub Actions ----------
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: diffian-website-github-actions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOIDCProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                # Covers personal repo now; update to diffian/diffian-website after org transfer
                token.actions.githubusercontent.com:sub: 'repo:mark-hayward/diffian-website:*'
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      Policies:
        - PolicyName: diffian-website-deploy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3Sync
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::diffian'
                  - !Sub 'arn:aws:s3:::diffian/*'
              - Sid: CloudFrontInvalidate
                Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/EF9LHCH0Z4JI4'

Outputs:
  GitHubActionsRoleArn:
    Description: IAM role ARN — set as AWS_ROLE_ARN in GitHub Actions secrets
    Value: !GetAtt GitHubActionsRole.Arn
