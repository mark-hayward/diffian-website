name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  AWS_REGION: eu-west-2
  S3_BUCKET: diffian
  CLOUDFRONT_DISTRIBUTION_ID: EF9LHCH0Z4JI4

jobs:
  deploy:
    name: Sync to S3 + Invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Upload index.html with a short TTL (changes go live within 60s via CloudFront)
          aws s3 cp index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "public,max-age=60,s-maxage=3600"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" "/"
